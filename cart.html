<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - BookNook</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">BookNook</a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="books.html">Books</a></li>
        <li>
          <a href="cart.html" class="cart-link active">
            Cart (<span id="cart-count">0</span>)
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Cart Page Header -->
  <section class="page-header">
    <div class="container">
      <h1>Shopping Cart</h1>
    </div>
  </section>

  <!-- Cart Content -->
  <section class="cart-section">
    <div class="container">
      <!-- Empty Cart Message -->
      <div class="empty-cart" id="empty-cart" style="display: none;">
        <h2>Your cart is empty</h2>
        <p>Looks like you haven't added any books yet.</p>
        <a href="books.html" class="btn btn-primary">Browse Books</a>
      </div>

      <!-- Cart Items -->
      <div class="cart-content" id="cart-content">
        <div class="cart-items" id="cart-items">
          <!-- Cart items will be loaded here by JavaScript -->
        </div>

        <!-- Cart Summary -->
        <div class="cart-summary">
          <h3>Order Summary</h3>
          <div class="summary-row">
            <span>Subtotal:</span>
            <span id="subtotal">$0.00</span>
          </div>
          <div class="summary-row">
            <span>Shipping:</span>
            <span>Free</span>
          </div>
          <div class="summary-row total">
            <span>Total:</span>
            <span id="total">$0.00</span>
          </div>
          <button class="btn btn-primary btn-checkout" onclick="checkout()">
            Proceed to Checkout
          </button>
        </div>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2025 BookNook. All rights reserved.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/books-data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/cart-page.js"></script>
</body>
</html>
