<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BookNook - Online Bookstore</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">BookNook</a>
      <ul class="nav-links">
        <li><a href="index.html" class="active">Home</a></li>
        <li><a href="books.html">Books</a></li>
        <li>
          <a href="cart.html" class="cart-link">
            Cart (<span id="cart-count">0</span>)
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-content">
      <h1>Welcome to BookNook</h1>
      <p>Discover your next favorite book from our collection</p>
      <a href="books.html" class="btn btn-primary">Browse Books</a>
    </div>
  </section>

  <!-- Featured Books Section -->
  <section class="featured-section">
    <div class="container">
      <h2>Featured Books</h2>
      <div class="books-grid" id="featured-books">
        <!-- Books will be loaded here by JavaScript -->
      </div>
      <div class="view-all">
        <a href="books.html" class="btn btn-secondary">View All Books</a>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2025 BookNook. All rights reserved.</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="js/books-data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
